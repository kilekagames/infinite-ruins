<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Ruins</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0608;
      color: #fff;
      font-family: 'Courier New', monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #unity-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: none !important;
    }

    /* Loading screen */
    #loading-screen {
      position: absolute;
      inset: 0;
      background: #0a0608;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      z-index: 100;
      transition: opacity 0.8s ease;
    }

    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loading-title {
      font-size: clamp(28px, 4vw, 52px);
      letter-spacing: 0.15em;
      color: #ffd75a;
      text-shadow: 0 0 30px rgba(255, 215, 90, 0.4);
    }

    .loading-subtitle {
      font-size: clamp(14px, 2vw, 20px);
      color: rgba(255, 215, 90, 0.7);
      letter-spacing: 0.3em;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    .progress-container {
      width: clamp(200px, 40vw, 400px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .progress-bar-track {
      width: 100%;
      height: 3px;
      background: rgba(255, 215, 90, 0.15);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: #ffd75a;
      border-radius: 2px;
      transition: width 0.3s ease;
      box-shadow: 0 0 8px rgba(255, 215, 90, 0.6);
    }

    .progress-pct {
      font-size: 13px;
      color: rgba(255, 215, 90, 0.5);
      letter-spacing: 0.2em;
    }

    /* Audio unlock overlay */
    #audio-unlock {
      position: absolute;
      inset: 0;
      background: rgba(10, 6, 8, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 200;
      cursor: pointer;
    }

    #audio-unlock.hidden {
      display: none;
    }

    .unlock-text {
      font-size: clamp(18px, 2.5vw, 28px);
      color: #ffd75a;
      letter-spacing: 0.15em;
      text-align: center;
    }

    .unlock-hint {
      font-size: clamp(12px, 1.5vw, 16px);
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas"></canvas>

    <div id="loading-screen">
      <div class="loading-title">INFINITE RUINS</div>
      <div class="loading-subtitle">Excavating memory layers...</div>
      <div class="progress-container">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <div class="progress-pct" id="progress-pct">0%</div>
      </div>
    </div>

    <div id="audio-unlock" class="hidden">
      <div class="unlock-text">CLICK TO BEGIN</div>
      <div class="unlock-hint">click anywhere to start</div>
    </div>
  </div>

  <script>
    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/BuildWebGL.loader.js";

    var config = {
      dataUrl:            buildUrl + "/BuildWebGL.data",
      frameworkUrl:       buildUrl + "/BuildWebGL.framework.js",
      codeUrl:            buildUrl + "/BuildWebGL.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName:        "Kileka Games",
      productName:        "InfiniteRuins_Prototype",
      productVersion:     "1.0",
      autoSyncPersistentDataPath: true,
    };

    var progressFill = document.getElementById("progress-fill");
    var progressPct  = document.getElementById("progress-pct");
    var loadingScreen = document.getElementById("loading-screen");
    var audioUnlock  = document.getElementById("audio-unlock");

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = function () {
      createUnityInstance(document.querySelector("#unity-canvas"), config, function (progress) {
        var pct = Math.round(progress * 100);
        progressFill.style.width = pct + "%";
        progressPct.textContent  = pct + "%";
      }).then(function (unityInstance) {
        // Fade out loading screen
        loadingScreen.classList.add("fade-out");
        setTimeout(function () { loadingScreen.style.display = "none"; }, 900);

        // Audio autoplay unlock — browsers block audio until user gesture
        var AudioContext = window.AudioContext || window.webkitAudioContext;
        if (AudioContext) {
          var ctx = new AudioContext();
          if (ctx.state === "suspended") {
            audioUnlock.classList.remove("hidden");
            function resumeAudio() {
              ctx.resume().then(function () {
                audioUnlock.classList.add("hidden");
                document.removeEventListener("click", resumeAudio);
                document.removeEventListener("keydown", resumeAudio);
              });
            }
            document.addEventListener("click",   resumeAudio);
            document.addEventListener("keydown", resumeAudio);
          }
        }

        // Best-effort save flush before tab close
        window.addEventListener("beforeunload", function () {
          try {
            unityInstance.SendMessage("SaveManager", "OnBeforeUnload");
          } catch(e) {}
        });

      }).catch(function (message) {
        alert(message);
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
